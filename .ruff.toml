# .ruff.toml
# cookiecutter-repo-governance
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# Ruff configuration for Python linting and auto-fix policy.
#
# Ruff is a fast Python linter and auto-formatter that can enforce a wide range
# of style and correctness rules. This configuration file defines the canonical
# Ruff linting policy for the cookiecutter-repo-governance project.
#
# Responsibilities
# - Define the repository's canonical Ruff linting policy for Python sources.
# - Target the minimum supported syntax level for this template repository.
#
# Maintainer Notes
# - Keep Ruff fast and opinionated but not overbearing.
# - Avoid conflicts with the more specific docstring rules enforced by
#   pydocstyle/pydoclint in pyproject.toml.
#
# References
# - Ruff configuration documentation: https://docs.astral.sh/ruff/configuration/
# - Ruff linter settings reference: https://docs.astral.sh/ruff/settings/
# - Ruff rule reference: https://docs.astral.sh/ruff/rules/

line-length = 88  # Matches Ruff's default, popularized by Black.
target-version = "py313"
extend-exclude = [
  "cookiecutter_community_health_docs.egg-info",
  "temp",
  "{{cookiecutter.project_slug}}",
  "*_FIXED.py",
  "*_NEW.py",
  "*_ORIG.py",
]

[lint]
# Docstring enforcement is handled by pydocstyle/pydoclint in pyproject.toml.
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "W",   # pycodestyle warnings
  "B",   # flake8-bugbear
  "I",   # isort
  "UP",  # pyupgrade
]
preview = true
extend-select = [
  "E203",  # Enforce autopep8 slice spacing (no space before ':')
]

[lint.isort]
combine-as-imports = false
force-single-line = true

[format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"
