# cookiecutter-repo-governance
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# Pytest configuration for repository test discovery and marker policy.
#
# Responsibilities
# - Define the repository's canonical pytest discovery roots.
# - Enforce strict marker registration so test intent stays explicit.
# - Keep marker taxonomy aligned with other Dagitali Python repositories where
#   practical.
#
# Maintainer Notes
# - Keep `testpaths` aligned with the active test-suite layout.
# - Register new markers here before using them in tests.
# - Add warning filters only when they protect this template repository from a
#   known migration or compatibility risk.
#
# References
# - Pytest marker reference: https://docs.pytest.org/en/stable/example/markers.html
# - Pytest warning filter guide: https://docs.pytest.org/en/stable/how-to/capture-warnings.html
# - Pytest configuration reference: https://docs.pytest.org/en/stable/reference/customize.html

[pytest]
testpaths = tests/meta tests/e2e tests/integration tests/unit
addopts = -ra --strict-markers
markers =
    # Level / scope
    meta: repository guardrail tests for docs, layout, conventions, and stable
    public surface expectations
    unit: isolated correctness tests (no real external services)
    integration: multi-component tests with real-ish dependencies (fs, db,
    http, etc.)
    e2e: end-to-end tests across the system boundary (e.g., ingest -> process
    -> persist/publish)

    # Purpose / intent
    smoke: go/no-go viability tests for builds and environments (broad, shallow)
    contract: compatibility tests for public interfaces (CLI/config/schema/protocol)
    acceptance: user-facing behavior tests (CLI UX, exit codes, messages)
    data_quality: semantic invariants over outputs (counts, uniqueness, constraints)
    resilience: fault-injection and retry/backoff/recovery behavior
    perf: performance/throughput tests (excluded from default CI runs)

    # Environment / dependencies
    requires_docker: needs Docker/Compose (containers for services)
    requires_network: needs network access beyond localhost
    requires_optional_deps: needs optional extra dependencies installed

    # Special
    property: property-based tests for generated content and invariants
