# cookiecutter-repo-governance
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# GitHub Actions workflow for continuous integration (CI).
#
# Responsibilities
# - Run pre-merge validation for pull requests targeting the long-lived GitFlow
#   branches.
# - Validate repository hygiene, Python linting, unit tests, and rendered
#   Cookiecutter template output before those changes land.
#
# Maintainer Notes
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
# - Keep required pull-request and merge-queue gates in `pr.yml`.
# - This workflow intentionally complements, rather than replaces, the lighter
#   integration checks that run earlier in the development loop.
# - Keep dependency installation aligned with the `dev` optional dependency
#   group in `pyproject.toml`.
# - The dynamic run name is part of the workflow contract: it should identify
#   the short-lived source branch and the long-running target branch for PR
#   review clarity.
#
# References
# - Cookiecutter documentation: https://cookiecutter.readthedocs.io/
# - GitHub Actions Python guide: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
# - GitHub Actions expressions reference: https://docs.github.com/en/actions/learn-github-actions/expressions
# - GitHub Actions security hardening guide: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
# - GitHub Actions workflow syntax reference: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# - GitHub pull request documentation: https://docs.github.com/en/pull-requests
# - GitHub merge queue documentation: https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/configuring-merge-queues
# - Python packaging documentation: https://packaging.python.org/
# - Pytest documentation: https://docs.pytest.org/
# - Ruff documentation: https://docs.astral.sh/ruff/

---

name: CI

run-name: >-
  ${{
    github.event_name == 'pull_request' &&
    format('CI: {0} -> {1}', github.head_ref, github.base_ref) ||
    github.event_name == 'merge_group' &&
    format('CI: merge queue for {0}', github.ref_name) ||
    'CI: manual dispatch'
  }}

on:
  pull_request:
    branches:
      # Long-lived GitFlow branches
      - main
      - develop
  merge_group:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions: {}

env:
  DEFAULT_PYTHON_VERSION: '3.14'

jobs:
  precommit:
    name: Repository hygiene checks
    runs-on: ubuntu-latest
    permissions: &permissions_read
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - name: Bootstrap Python
        uses: Dagitali/python-bootstrap@eebcaa17afad3256b944399e1e34ba355b30e895  # Pinned v0.1.3
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          pip-install: "-e .[dev]"

      - name: Run pre-commit checks
        env:
          SKIP: no-commit-to-branch
        run: python -m pre_commit run --all-files

  test:
    name: Template validation on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - '3.13'
          - '3.14'
    permissions: *permissions_read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - name: Bootstrap Python
        uses: Dagitali/python-bootstrap@eebcaa17afad3256b944399e1e34ba355b30e895  # Pinned v0.1.3
        with:
          python-version: ${{ matrix.python-version }}
          pip-install: "-e .[dev]"

      # TODO: Reevaluate whether this duplicates the explicit Ruff lint step below.
      - name: Run lint checks
        run: ruff check hooks tests
      - name: Run tests
        run: pytest
