# cd.yml
# cookiecutter-repo-governance
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# A GitHub Actions workflow for continuous distribution (CD) via tagged
# releases.
#
# Responsibilities
# - Validate the tagged Cookiecutter template before publishing release notes.
# - Publish the tagged GitHub Release as the canonical release-history surface.
# - Avoid package-index publishing and hosted documentation publication because
#   this repository is a Cookiecutter template, not a PyPI-distributed package.
#
# Maintainer Notes
# - GitHub Release note categories are configured separately in
#   `.github/release.yml`.
# - The GitHub Release is the public versioned distribution surface for this
#   template repository.
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
# - Keep dependency installation aligned with the `dev` optional dependency
#   group in `pyproject.toml`.
# - The dynamic run name is part of the workflow contract: it should identify
#   the tagged version for release clarity.
#
# References
# - Cookiecutter documentation: https://cookiecutter.readthedocs.io/
# - GitHub Actions expressions reference: https://docs.github.com/en/actions/learn-github-actions/expressions
# - GitHub Actions security hardening guide: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
# - GitHub Actions workflow syntax reference: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# - GitHub Release documentation: https://docs.github.com/en/repositories/releasing-projects
# - Pytest documentation: https://docs.pytest.org/
# - Ruff documentation: https://docs.astral.sh/ruff/

---

name: Release

run-name: >-
  ${{
    github.ref_type == 'tag' &&
    format('Release: {0}', github.ref_name) ||
    'Release'
  }}

on:
  push:
    tags: ['v*.*.*']

permissions: {}

env:
  DEFAULT_PYTHON_VERSION: '3.14'

jobs:
  validate:
    name: Validate tagged template
    runs-on: ubuntu-latest
    permissions: &permissions_read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3

      - name: Bootstrap Python
        uses: Dagitali/python-bootstrap@eebcaa17afad3256b944399e1e34ba355b30e895  # Pinned v0.1.3
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          pip-install: "-e .[dev]"

      - name: Run pre-commit checks
        env:
          SKIP: no-commit-to-branch
        run: python -m pre_commit run --all-files

      - name: Run tests
        run: pytest

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # Pinned v3.0.0
        with:
          generate_release_notes: true
