# cookiecutter-repo-governance
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# GitHub issue template for proposing user-facing features.
#
# Responsibilities
# - Gather the minimum information needed to state a concrete problem and to
#   propose and evaluate solutions and alternatives for feature requests.
#
# Maintainer Notes
# - Keep this form oriented toward actionable product improvements rather
#   than general support questions.
# - Keep this form's prompts focused on actionable details for maintainers.

---

name: Feature Request
description: Propose a user-facing capability or workflow improvement.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form for concrete feature requests. For general questions or exploratory ideas, use GitHub Discussions instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is blocked, confusing, or unnecessarily difficult today?
      placeholder: Describe the current pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, documentation, policy, or workflow change you want.
      placeholder: Describe the requested change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternate approaches have you considered, and why are they insufficient?
  - type: textarea
    id: examples
    attributes:
      label: Example config or command
      description: Include a pipeline snippet, CLI call, or API example if relevant.
      render: yaml
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Documentation
        - Contribution process
        - Release process
        - Security or support policy
        - Cookiecutter settings
        - Generated template files
        - Hook behavior
        - Automation or CI
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for related requests.
          required: true
        - label: This request describes a concrete, user-facing need rather than a broad brainstorming topic.
          required: true
