# bug_report.yml
# cookiecutter-repo-governance
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# GitHub issue form for reporting reproducible bugs.
#
# Responsibilities
# - Gather the minimum information needed to reproduce and triage defects.
#
# Maintainer Notes
# - Keep the prompts focused on actionable reproduction details for
#   maintainers.

---

name: Bug Report
description: Report a reproducible problem or defect in cookiecutter-repo-governance.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for maintainers to reproduce the problem on a clean checkout or install.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
      placeholder: A short description of the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide exact steps, commands, configuration, and/or sample inputs needed to reproduce the bug.
      placeholder: |
        1. Render the template with ...
        2. Inspect the generated file ...
        3. Run the relevant local check ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any traceback, command output, logs, screenshots, or failing assertion.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which release, tag, or commit shows the problem?
      placeholder: v0.3.4 or abc1234
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output from `python --version`.
      placeholder: Python 3.13.2
    validations:
      required: true
  - type: dropdown
    id: install-mode
    attributes:
      label: Render mode
      description: How did you render or validate the template?
      options:
        - cookiecutter gh:Dagitali/cookiecutter-repo-governance
        - cookiecutter .
        - pip install -e .[dev]
        - make render
        - other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, runtime, browser, service, or other relevant environment details.
      placeholder: macOS 15, Python 3.13, Chrome 142, etc.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the current default branch or latest release.
          required: true
        - label: I included enough detail for maintainers to reproduce or investigate the issue.
          required: true
